name: Build Plugin (Android + Linux)

# Builds the GMP plugin binaries for Android and Linux using Epic's official
# Linux dev containers on GitHub-hosted runners. Public repo -> hosted-runner
# minutes are unlimited & free.
#
# PREREQUISITE (one-time): the official images at ghcr.io/epicgames/unreal-engine
# are gated behind Epic's EULA. You must:
#   1. Link your Epic Games account with your GitHub account
#      (https://www.unrealengine.com/en-US/blog/updated-linux-unreal-engine-...
#       -> "Connect your GitHub account"), so your account can pull the images.
#   2. Create a GitHub PAT (classic) with the `read:packages` scope.
#   3. Add it as a repo secret named GHCR_PAT (Settings > Secrets and variables > Actions).
#
# Windows / iOS / Mac binaries are NOT built here: Epic has no official Windows/Mac
# containers, so those require self-hosted runners with the engine installed.

on:
  # Manual run: optionally pin a single engine version (e.g. "5.6"); leave blank to build the full matrix.
  workflow_dispatch:
    inputs:
      engine_version:
        description: "Single UE version to build (e.g. 5.6). Empty = full matrix."
        required: false
        default: ""
  push:
    tags:
      - "v*"          # build on release tags
  # Uncomment to also build on every push to main:
  # push:
  #   branches: [ main ]

# Needed so the compile-verify job can move the per-version `build-UE<ver>` tag.
permissions:
  contents: write

jobs:
  # Resolve which engine versions to build: the single dispatch input, or the full matrix.
  setup:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.pick.outputs.versions }}
    steps:
      - id: pick
        run: |
          if [ -n "${{ github.event.inputs.engine_version }}" ]; then
            echo "versions=[\"${{ github.event.inputs.engine_version }}\"]" >> "$GITHUB_OUTPUT"
          else
            # Newest first. If Epic has not published a dev-<ver> tag yet, that matrix
            # leg fails independently (fail-fast: false) -- just remove the version here.
            echo 'versions=["5.8","5.7","5.6","5.5","5.4"]' >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # one missing/failing engine version must not cancel the others
      matrix:
        engine: ${{ fromJson(needs.setup.outputs.versions) }}
    # NOTE: NOT a `container:` job. The UE dev image is 30GB+ decompressed, but
    # ubuntu-latest has only ~14GB free -- a container job pulls the image before
    # any step runs, so there is no chance to free disk first. Instead we run a
    # normal job, free disk + relocate Docker storage to the large /mnt partition,
    # THEN pull & run the image manually.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false   # we need Docker; only prune unrelated caches
          swap-storage: false

      - name: Move Docker storage to /mnt (large partition)
        run: |
          set -euxo pipefail
          sudo systemctl stop docker docker.socket || sudo service docker stop
          sudo mkdir -p /mnt/docker
          sudo mv /var/lib/docker /mnt/docker/lib || true
          sudo mkdir -p /etc/docker
          echo '{ "data-root": "/mnt/docker/lib" }' | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker || sudo service docker start
          echo "=== disk after relocate ==="; df -h / /mnt

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Compile-verify plugin (Android + Linux)
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/epicgames/unreal-engine:dev-${{ matrix.engine }}"
          docker pull "$IMAGE"
          mkdir -p "$GITHUB_WORKSPACE/Out"
          # Mount the checkout into the container; run everything as the ue4 user (owns the engine tree).
          # The official dev image ships the engine + Linux toolchain but NOT the Android SDK/NDK/JDK,
          # so BuildPlugin would silently skip Android. SetupAndroid.sh downloads the version-matched
          # NDK/SDK before building. This is compile-verification only -- artifacts come from a separate
          # source-packaging step, so build output stays in the container.
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/project \
            --user root \
            "$IMAGE" \
            bash -c '
              set -euo pipefail
              # Give ue4 ONLY the output dir. Source is read-only for the build; the checkout
              # (incl. .git) stays owned by the host runner so later host-side steps (tag, upload)
              # can touch it without permission fixups.
              chown ue4 /project/Out
              UE=/home/ue4/UnrealEngine

              # ---- Android toolchain, best-effort. Any failure -> fall back to Linux-only, never fail the job. ----
              export ANDROID_HOME=/opt/android-sdk
              export ANDROID_SDK_ROOT="$ANDROID_HOME"
              # UE5.6+ NDK; if a matrix engine wants a different NDK it just skips Android (best-effort).
              ANDROID_NDK_VER="25.1.8937393"
              CLT_URL="https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"

              install_android() {
                set -e
                apt-get update -qq && apt-get install -y -qq openjdk-17-jdk-headless wget unzip
                export JAVA_HOME="$(dirname "$(dirname "$(readlink -f "$(which javac)")")")"
                mkdir -p "$ANDROID_HOME/cmdline-tools"
                wget -q "$CLT_URL" -O /tmp/clt.zip
                unzip -q -o /tmp/clt.zip -d "$ANDROID_HOME/cmdline-tools"
                mv -f "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
                local SDKM="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
                mkdir -p /root/.android && echo "count=0" > /root/.android/repositories.cfg
                yes | "$SDKM" --licenses >/dev/null 2>&1 || true
                yes | "$SDKM" "platform-tools" "platforms;android-34" "build-tools;34.0.0" "cmake;3.22.1" "ndk;$ANDROID_NDK_VER"
                export NDKROOT="$ANDROID_HOME/ndk/$ANDROID_NDK_VER"
                export NDK_ROOT="$NDKROOT"
                export ANDROID_NDK_ROOT="$NDKROOT"
                chmod -R a+rX "$ANDROID_HOME"   # ue4 must read the SDK/NDK
              }

              PLATFORMS="Linux"
              if install_android; then
                echo "Android toolchain installed -> including Android platform."
                PLATFORMS="Android+Linux"
              else
                echo "WARNING: Android toolchain setup failed -- building Linux only (best-effort, not fatal)."
              fi

              echo "===== BuildPlugin: $PLATFORMS ====="
              # --preserve-environment so ue4 inherits ANDROID_HOME/NDKROOT/JAVA_HOME set above.
              if ! runuser --preserve-environment -u ue4 -- "$UE/Engine/Build/BatchFiles/RunUAT.sh" \
                    BuildPlugin \
                    -Plugin=/project/Plugins/GMP/GMP.uplugin \
                    -Package=/project/Out \
                    -TargetPlatforms="$PLATFORMS" \
                    -Rocket -utf8output; then
                if [ "$PLATFORMS" = "Android+Linux" ]; then
                  echo "WARNING: BuildPlugin failed with Android -- retrying Linux-only (best-effort)."
                  runuser --preserve-environment -u ue4 -- "$UE/Engine/Build/BatchFiles/RunUAT.sh" \
                    BuildPlugin \
                    -Plugin=/project/Plugins/GMP/GMP.uplugin \
                    -Package=/project/Out \
                    -TargetPlatforms=Linux \
                    -Rocket -utf8output
                else
                  exit 1   # Linux-only build genuinely failed -> real error
                fi
              fi

              echo "===== Binaries produced ====="
              find /project/Out -path "*Binaries/*" -type d | sort -u
              if [ "$PLATFORMS" = "Android+Linux" ] && ! find /project/Out -path "*Binaries/Android*" -type f | grep -q .; then
                echo "WARNING: Android requested but no Android binaries produced (skipped)."
              fi
            '
        # Compile-verify only: no artifact from this job. The plugin source is published
        # once by the separate `package-source` job below (source is version-independent).

      # Move the per-version tag to this commit once compile-verify passed. Force-updated so it
      # always points at the latest commit that compiled clean for this engine version.
      # Named `build-UE<ver>` (not `v*`) so it does not re-trigger this workflow's tag filter.
      # (Pushes via GITHUB_TOKEN also do not trigger further workflow runs.)
      - name: Tag compiled-clean commit
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          TAG="build-UE${{ matrix.engine }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG"
          git push -f origin "refs/tags/$TAG"
          echo "Tagged $TAG -> $(git rev-parse --short HEAD)"

  # Publish the plugin SOURCE (uplugin + Source + Config) as a single artifact -- the part
  # a marketplace/Fab submission needs. Decoupled from the compile matrix so concurrent
  # matrix legs don't race on a same-named upload; runs only after all compiles pass.
  package-source:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package plugin source
        shell: bash
        run: |
          set -euo pipefail
          DEST="$GITHUB_WORKSPACE/dist/GMP"
          mkdir -p "$DEST"
          cp -rL Plugins/GMP/GMP.uplugin "$DEST/"
          cp -rL Plugins/GMP/Source "$DEST/"
          cp -rL Plugins/GMP/Config "$DEST/"
          # Drop any build products that slipped in via symlinked source.
          find "$DEST" -type d \( -name Binaries -o -name Intermediate \) -prune -exec rm -rf {} + 2>/dev/null || true

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: GMP-Source
          path: dist/GMP
          if-no-files-found: error
          overwrite: true
